name: Bilibili AI Insight Bot

on:
  schedule:
    # 设定在每天北京时间早上 9:11 运行 (错峰出行)
    - cron: '11 1 * * *'
  workflow_dispatch: # 保留手动触发按钮，方便随时验收

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 安装必要的 Python 包
          pip install playwright requests yagmail
          
          # 🚨 终极绝招：在无头服务器上安装浏览器及其系统底层依赖（没有这一步必报错！）
          playwright install --with-deps chromium

      - name: Run Scraper and Send Email
        env:
          # 自动去 GitHub Secrets 里提取你之前存好的秘钥
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python social_scraper/main.py