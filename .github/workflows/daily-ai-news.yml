name: Daily AI News Report

on:
  schedule:
    # 每天早上 8 点 UTC 运行 (北京时间下午 4 点)
    # 如需调整时区，请修改 cron 表达式
    - cron: '0 8 * * *'
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  fetch-and-report:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser yagmail

      - name: Fetch AI news and generate report
        run: |
          python scripts/fetch_ai_models_news.py

      - name: Send daily report email
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python scripts/send_report_email.py
            EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
            EMAIL_TO: ${{ secrets.EMAIL_TO }}
          run: |
            python scripts/send_report_email.py
      
      - name: Configure Git
        run: |
          git config --local user.email "claw-agent@github.local"
          git config --local user.name "Claw AI Agent"
      
      - name: Check for changes and commit
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add reports/
            git commit -m "🤖 chore: auto-generate daily AI news report"
            git push
            echo "✅ Daily report committed and pushed!"
          fi
      
      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-ai-reports
          path: reports/
          retention-days: 30
