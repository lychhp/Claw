- name: Run Monitor and Notify
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          # 如果你的 send_email 还需要其他 key (比如 DeepSeek)，也加在这里
        run: |
          python scripts/badminton_monitor.py